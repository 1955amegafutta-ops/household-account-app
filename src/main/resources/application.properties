spring.application.name=household-account-api

# MySQLへの接続設定
spring.datasource.url=jdbc:mysql://localhost:3306/household_account_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Tokyo
spring.datasource.username=root
spring.datasource.password=

# Hibernate（JPA）の設定
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true